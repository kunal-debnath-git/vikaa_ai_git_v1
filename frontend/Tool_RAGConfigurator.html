<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RAG Configurator — Vikaa.AI</title>

  <script src="config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="icon" type="image/png" href="image/Logo4.jpeg">

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      font-family: 'Montserrat', sans-serif;
      background: #f4f6f9; color: #333;
      display: flex; flex-direction: column;
    }
    .action-bar {
      padding: 12px 20px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      display: flex; align-items: center; gap: 10px;
    }
    .action-bar h3 {
      margin: 0; font-size: 0.81rem; font-weight: 700; color: #0f2942;
      flex: 1; display: flex; align-items: center; gap: 8px;
    }
    .status-badge {
      font-size: 0.62rem; font-weight: 700; border-radius: 10px;
      padding: 2px 8px; letter-spacing: 0.5px;
      background: #fef3c7; color: #92400e; border: 1px solid #fcd34d;
    }
    .coming-soon-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 40px;
      text-align: center;
    }
    .coming-soon-icon {
      font-size: 4rem;
      color: #17bcfe;
      opacity: 0.7;
    }
    .coming-soon-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: #0f2942;
      margin: 0;
    }
    .coming-soon-subtitle {
      font-family: 'Roboto', sans-serif;
      font-size: 0.95rem;
      font-weight: 400;
      color: #666;
      max-width: 420px;
      line-height: 1.6;
      margin: 0;
    }
    .back-link {
      margin-top: 10px;
      font-size: 0.82rem;
      color: #17bcfe;
      text-decoration: none;
      font-weight: 600;
    }
    .back-link:hover { color: #0891b2; }
  </style>
</head>
<body>

  <div class="action-bar">
    <h3>
      <i class="fas fa-database"></i>
      RAG Configurator
      <span class="status-badge">Coming Soon</span>
    </h3>
  </div>

  <div class="coming-soon-container">
    <div class="coming-soon-icon">
      <i class="fas fa-database"></i>
    </div>
    <p class="coming-soon-title">Coming Soon</p>
    <p class="coming-soon-subtitle">
      RAG Configurator is under active development. Configure retrieval-augmented generation pipelines, manage vector stores, and fine-tune context injection — all from one interface.
    </p>
  </div>

</body>
</html>
