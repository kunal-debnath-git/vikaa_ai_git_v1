<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Cache-Control" content="no-store" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <title>Vikaa.AI - Select Mode</title>

  <!-- Config (shared API + dev trust); logout uses CONFIG.API_BASE_URL -->
  <script src="config.js?v=20260404"></script>

  <!-- Google Fonts: Montserrat & Roboto -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Roboto:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="image/Logo4.jpeg">

  <style>
    body {
        font-family: 'Montserrat', sans-serif;
        background-color: #eaeaea;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
        color: #333;
    }

    header {
      background-color: #ffffff;
      padding: 10px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #ddd;
    }

    .logo {
      display: flex;
      align-items: center;
      font-weight: 700;
      color: #575757;
      font-size: 0.99rem;
    }

    .logo img {
      height: 32px;
      margin-right: 10px;
      border-radius: 4px;
      object-fit: contain;
    }

    .nav-logout-btn {
      margin-left: 20px;
      font-weight: 600;
      text-decoration: none;
      color: #17bcfe;
      font-size: 0.9rem;
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'Montserrat', sans-serif;
      padding: 0;
      transition: color 0.2s;
    }

    .nav-logout-btn:hover {
      color: #0891b2;
    }

    .nav-user-email {
      margin-left: 20px;
      font-size: 0.8rem;
      color: #999;
      font-style: italic;
      font-family: 'Roboto', sans-serif;
    }

    .horizontal-border {
      background-color: #17bcfe;
      padding: 2px;
      width: 100%;
    }

    .main-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .welcome-text {
      margin-bottom: 40px;
    }

    .welcome-text h1 {
      font-size: 1.98rem;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .welcome-text p {
      font-family: 'Roboto', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      color: #666;
    }

    .button-group {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .mode-button {
      width: 280px;
      height: 180px;
      background-color: #ffffff;
      border: 2px solid transparent;
      border-radius: 15px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      transition: all 0.3s ease;
      text-decoration: none;
      color: inherit;
    }

    .mode-button:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 35px rgba(23, 188, 254, 0.2);
      border-color: #17bcfe;
    }

    .mode-button i {
      font-size: 3rem;
      color: #17bcfe;
      margin-bottom: 15px;
    }

    .mode-button span {
      font-size: 1.26rem;
      font-weight: 700;
      color: #333;
    }

    .mode-button p {
      font-family: 'Roboto', sans-serif;
      font-size: 0.85rem;
      font-weight: 400;
      color: #888;
      margin-top: 8px;
    }

    footer {
      padding: 20px;
      text-align: center;
      font-size: 0.8rem;
      color: #999;
      font-weight: 400;
    }

    @media (max-width: 600px) {
      .button-group {
        flex-direction: column;
      }
      .mode-button {
        width: 80vw;
        height: 150px;
      }
      header {
        padding: 10px 20px;
      }
    }
  </style>
  
  <!-- Font Awesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <header>
    <div class="logo">
      <img src="image/Logo4.jpeg" alt="Vikaa Logo">
      <span>Vikaa.AI</span>
    </div>
    <nav>
      <span class="nav-user-email" id="navUserEmail"></span>
      <button type="button" class="nav-logout-btn" onclick="doLogout()">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </nav>
  </header>

  <div class="horizontal-border"></div>

  <div class="main-container">
    <div class="welcome-text">
      <h1>Welcome back!</h1>
      <p>Please select a mode to continue your productivity journey.</p>
    </div>

    <div class="button-group">
      <!-- Chat Mode Button -->
      <a href="vikaa_ai_agent.html" class="mode-button" id="chatModeBtn">
        <i class="fas fa-comments"></i>
        <span>Chat Mode</span>
        <p>Conversational AI Assistant</p>
      </a>

      <!-- Tool Mode Button -->
      <a href="ToolIndex.html" class="mode-button" id="toolModeBtn">
        <i class="fas fa-tools"></i>
        <span>Tool Mode</span>
        <p>Specialized AI Utilities</p>
      </a>
    </div>
  </div>

  <footer>
    &copy; 2026 Vikaa.AI - Smart Agentic Experience
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      console.log("Landing Page Loaded");

      const chatBtn = document.getElementById('chatModeBtn');
      const toolBtn = document.getElementById('toolModeBtn');

      chatBtn.addEventListener('click', () => {
        console.log("Entering Chat Mode...");
      });

      toolBtn.addEventListener('click', () => {
        console.log("Entering Tool Mode...");
      });

      // Anti-copy logic (consistent with other pages)
      document.addEventListener("contextmenu", e => e.preventDefault());
      document.onkeydown = e => {
        if (e.ctrlKey && ['u','s','c'].includes(e.key.toLowerCase())) {
          e.preventDefault();
        }
      };
    });

    (function showNavUserEmail() {
      try {
        const raw = localStorage.getItem("userInfo");
        const info = raw ? JSON.parse(raw) : null;
        if (info && info.email) {
          const el = document.getElementById("navUserEmail");
          if (el) el.textContent = info.email;
        }
      } catch (e) { /* ignore */ }
    })();

    // Logout (same flow as ToolIndex.html / vikaa_ai_agent.js)
    async function doLogout() {
      const SUPABASE_URL = "https://dvawnejohsmjycxuhenu.supabase.co";
      const BACKEND_URL = (typeof CONFIG !== "undefined")
        ? CONFIG.API_BASE_URL
        : "https://app-wtiw.onrender.com";

      const tokenDataRaw = localStorage.getItem("authData");
      const accessToken = tokenDataRaw ? JSON.parse(tokenDataRaw)?.accessToken : null;
      const sessionId = localStorage.getItem("session_id");

      if (accessToken && sessionId) {
        try {
          await fetch(`${BACKEND_URL}/auth/logout`, {
            method: "POST",
            headers: {
              "Authorization": `Bearer ${accessToken}`,
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ session_id: sessionId })
          });
        } catch (err) { console.error("Backend logout failed:", err); }
      }

      if (accessToken) {
        try {
          await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
            method: "POST",
            headers: {
              "Authorization": `Bearer ${accessToken}`,
              "Content-Type": "application/json"
            }
          });
        } catch (err) { console.error("Supabase logout failed:", err); }
      }

      localStorage.removeItem("authData");
      localStorage.removeItem("session_id");
      localStorage.removeItem("userEmail");
      localStorage.removeItem("vikaa_tour_mode");
      const base = window.location.href.substring(0, window.location.href.lastIndexOf("/"));
      window.location.href = base + "/index.html";
    }
  </script>
</body>
</html>
