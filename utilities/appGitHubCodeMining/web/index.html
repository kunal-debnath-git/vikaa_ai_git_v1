<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>vikaa.ai Deep GitHub Miner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand">vikaa.ai Deep GitHub Miner</div>
      <div class="status" id="statusText">Idle</div>
    </header>

  <!-- Main layout: inputs (left) and outputs (right) -->
  <main class="app-grid">
      <section class="panel inputs">
  <h2>Inputs</h2>
  <!-- The search form supports repo and deep modes; Deep exposes token field -->
        <form id="searchForm">
          <div class="field-grid">
            <div class="field">
              <label for="mode">Mode</label>
              <select id="mode" name="mode">
                <option value="repo" selected>Repository Search</option>
                <option value="deep">Deep Code Search</option>
              </select>
            </div>
            <div class="field" id="tokenField" style="display:none;">
              <label for="github_token">GitHub Token (optional for deep)</label>
              <input id="github_token" name="github_token" type="password" placeholder="ghp_..." />
            </div>
          </div>
          <div class="section-title">Query</div>
          <div class="field">
            <label for="prompt">Prompt</label>
            <input id="prompt" name="prompt" type="text" placeholder="e.g., rag and mcp server" required />
          </div>

          <div class="section-title">Basics</div>
          <div class="field-grid">
            <div class="field">
              <label for="language">Language</label>
              <input id="language" name="language" type="text" value="python" />
            </div>
            <div class="field">
              <label for="months">Months</label>
              <input id="months" name="months" type="number" min="1" max="36" value="3" />
            </div>
            <div class="field">
              <label for="max">Max results</label>
              <input id="max" name="max" type="number" min="1" max="200" value="50" />
            </div>
            <div class="field">
              <label for="min_stars">Min stars</label>
              <input id="min_stars" name="min_stars" type="number" min="0" value="0" />
            </div>
          </div>

          <div class="section-title">LLM options</div>
          <div class="field-grid">
            <div class="field">
              <label for="llm_provider">LLM provider</label>
              <select id="llm_provider" name="llm_provider">
                <option value="gpt" selected>GPT (OpenAI/Azure)</option>
                <option value="gemini">Gemini</option>
              </select>
            </div>
            <div class="field">
              <label for="llm_model">LLM model</label>
              <select id="llm_model" name="llm_model">
                <option value="gpt-4o-mini" selected>gpt-4o-mini (GPT)</option>
                <option value="gpt-4o">gpt-4o (GPT)</option>
                <option value="gpt-3.5-turbo">gpt-3.5-turbo (GPT)</option>
                <option value="models/gemini-1.5-flash">models/gemini-1.5-flash (Gemini)</option>
                <option value="gemini-1.5-pro">gemini-1.5-pro (Gemini)</option>
              </select>
            </div>
            <div class="field">
              <label for="llm_temperature">LLM temperature (0-1)</label>
              <input id="llm_temperature" name="llm_temperature" type="number" min="0" max="1" step="0.1" value="0.2" />
            </div>
            <div class="field">
              <label for="llm_rerank_top">LLM re-rank top K (0=off)</label>
              <input id="llm_rerank_top" name="llm_rerank_top" type="number" min="0" value="0" />
            </div>
            <div class="field checkbox">
              <input id="llm_filter" name="llm_filter" type="checkbox" />
              <label for="llm_filter">Filter templates/awesome lists (LLM)</label>
            </div>
            <div class="field checkbox">
              <input id="llm_expand" name="llm_expand" type="checkbox" />
              <label for="llm_expand">Use LLM for prompt expansion</label>
            </div>
          </div>

          <div class="actions">
            <button id="runBtn" type="submit">Run Search</button>
            <button id="cancelBtn" type="button" class="secondary">Cancel</button>
          </div>
        </form>

        <div class="progress">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="progress-text" id="progressText">Waiting to start…</div>
      </section>

  <section class="panel outputs">
  <h2>Results</h2>
        <div id="summary" class="summary"></div>
        <div id="results" class="results"></div>
      </section>
    </main>

    <footer class="app-footer">
      <div>Powered by vikaa.ai</div>
      <div id="timing"></div>
    </footer>

    <script src="./app.js"></script>
  </body>
</html>
